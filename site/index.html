<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smoke Timer 문서</title>
    <meta
      http-equiv="refresh"
      content="0; url=./privacy-policy/"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #16202a;
        --muted: #5d6b7a;
        --accent: #0f8b8d;
        --border: #d7dee7;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        max-width: 520px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 12px 36px rgba(22, 32, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Smoke Timer 문서</h1>
        <p>개인정보처리방침 페이지로 이동합니다.</p>
        <a href="./privacy-policy/">개인정보처리방침 바로가기</a>
      </section>
    </main>
  </body>
</html>
